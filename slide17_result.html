<!DOCTYPE html>
<html>
<head>

<title>Result - CE Amplifier</title>

<style>

body {
    font-family: Arial;
    background: linear-gradient(to right, #e3f2fd, #ffffff);
    text-align: center;
    margin-top: 100px;
}

h1 {
    color: #0d47a1;
    animation: fadeIn 2s ease-in;
}

p {
    font-size: 22px;
    color: #333;
    animation: slideUp 3s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {
        transform: translateY(50px);
        opacity: 0;
    }
    to {
        transform: translateY(0px);
        opacity: 1;
    }
}

</style>

</head>

<body>

<h1>Result</h1>

<p>
The frequency response of the Common Emitter (CE) amplifier was studied successfully.
</p>

<p>
The voltage gain was maximum in the mid-frequency region and decreased at low and high frequencies.
</p>

<p>
Thus, the cutoff frequencies and bandwidth of the CE amplifier were verified successfully.
</p>

</body>

</html>
